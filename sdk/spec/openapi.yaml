openapi: 3.1.0
info:
  title: Agent-Fabric API
  version: 0.1.0
  summary: Governed operational fabric API for agents, humans, tools, boxes, and state.
  description: |
    Agent-Fabric OpenAPI is the HTTP interoperability surface for clients that do not use MCP directly.

    MCP remains the primary agent/tool API. OpenAPI is provided for dashboards, SDKs, operators,
    integrations, and automation systems that need conventional HTTP contracts.

    The API preserves Fabric invariants: validation, authority, reconciliation, traceability,
    lifecycle, and projected state.
servers:
  - url: https://fabric.example.com
    description: Production Fabric API
  - url: http://localhost:8080
    description: Local Fabric API

tags:
  - name: Topology
  - name: Records
  - name: Tools
  - name: State
  - name: Health

paths:
  /v1/tools/observe:
    post:
      tags: [Tools]
      operationId: observe
      summary: Record a Fabric observation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObserveRequest'
      responses:
        '202':
          description: Observation recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolAcceptedResponse'

  /v1/tools/propose:
    post:
      tags: [Tools]
      operationId: propose
      summary: Create a Fabric proposal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProposeRequest'
      responses:
        '202':
          description: Proposal recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalResponse'

  /v1/tools/validate:
    post:
      tags: [Tools]
      operationId: validate
      summary: Validate a Fabric record or message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateRequest'
      responses:
        '200':
          description: Validation report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationReport'

  /v1/tools/authorize:
    post:
      tags: [Tools]
      operationId: authorize
      summary: Evaluate authority for an action.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizeRequest'
      responses:
        '200':
          description: Authority result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorityResult'

  /v1/tools/reconcile:
    post:
      tags: [Tools]
      operationId: reconcile
      summary: Produce a reconciliation plan or outcome.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconcileRequest'
      responses:
        '200':
          description: Reconciliation response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationResponse'

  /v1/tools/project:
    post:
      tags: [Tools]
      operationId: project
      summary: Project stable Fabric state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
      responses:
        '200':
          description: State projected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateResponse'

  /v1/resources/{collection}/{id}:
    get:
      tags: [Records]
      operationId: getResource
      summary: Read a Fabric resource.
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: asOf
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Fabric resource envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceEnvelope'

  /v1/query:
    post:
      tags: [State]
      operationId: query
      summary: Query Fabric state, topology, authority, evidence, or history.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Query response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'

  /v1/health/{target}:
    get:
      tags: [Health]
      operationId: health
      summary: Return Fabric health for a target.
      parameters:
        - name: target
          in: path
          required: true
          schema:
            type: string
        - name: depth
          in: query
          required: false
          schema:
            type: string
            enum: [participant, box, cluster, domain, federation]
      responses:
        '200':
          description: Health response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  schemas:
    RiskLevel:
      type: string
      enum: [low, medium, high, critical]

    LifecycleStatus:
      type: string
      enum:
        - draft
        - proposed
        - validating
        - needsEvidence
        - needsAuthority
        - needsContract
        - approved
        - active
        - degraded
        - challenged
        - quarantined
        - suspended
        - superseded
        - retired
        - archived
        - rejected
        - failed
        - expired
        - violated
        - fulfilled

    FabricLink:
      type: object
      required: [rel, href]
      properties:
        rel:
          type: string
        href:
          type: string

    Envelope:
      type: object
      required: [id, type, source, subject, time, trace, intent, identity, risk, payload]
      properties:
        id:
          type: string
        type:
          type: string
        source:
          type: string
        recipient:
          type: string
        subject:
          type: string
        time:
          type: string
          format: date-time
        trace:
          type: string
        correlationId:
          type: string
        causationId:
          type: string
        intent:
          type: string
        identity:
          type: string
        authorityChain:
          type: string
        risk:
          $ref: '#/components/schemas/RiskLevel'
        payload:
          type: object
          additionalProperties: true

    ObserveRequest:
      type: object
      required: [subject, eventType, source, payload, intent, trace]
      properties:
        subject:
          type: string
        eventType:
          type: string
        source:
          type: string
        payload:
          type: object
          additionalProperties: true
        intent:
          type: string
        trace:
          type: string

    ProposeRequest:
      type: object
      required: [proposalType, subject, risk, evidence, proposedChange]
      properties:
        proposalType:
          type: string
          enum: [GapFillProposal, RepairProposal, VocabularyGapProposal, StateChangeProposal]
        subject:
          type: string
        risk:
          $ref: '#/components/schemas/RiskLevel'
        evidence:
          type: array
          minItems: 1
          items:
            type: string
        proposedChange:
          type: object
          additionalProperties: true

    ValidateRequest:
      type: object
      required: [target]
      properties:
        target:
          type: string
        validationTypes:
          type: array
          items:
            type: string
            enum: [schema, semantic, authority, temporal, topology, evidence, policy]

    AuthorizeRequest:
      type: object
      required: [actor, action, resource, scope, risk]
      properties:
        actor:
          type: string
        action:
          type: string
        resource:
          type: string
        scope:
          type: string
        risk:
          $ref: '#/components/schemas/RiskLevel'
        validation:
          type: string

    ReconcileRequest:
      type: object
      required: [target, desiredState, observedState, currentState, validation, authorityResult, evidence, risk]
      properties:
        target:
          type: string
        desiredState:
          type: string
        observedState:
          type: string
        currentState:
          type: string
        validation:
          type: string
        authorityResult:
          type: string
        evidence:
          type: array
          minItems: 1
          items:
            type: string
        risk:
          $ref: '#/components/schemas/RiskLevel'

    ProjectRequest:
      type: object
      required: [subject, projectionContract, derivedFrom]
      properties:
        subject:
          type: string
        projectionContract:
          type: string
        derivedFrom:
          type: array
          minItems: 1
          items:
            type: string

    QueryRequest:
      type: object
      required: [queryType, target]
      properties:
        queryType:
          type: string
          enum:
            - stateAsOf
            - relationshipsFor
            - commitmentsFor
            - authorityFor
            - evidenceFor
            - traceFor
            - openProposals
            - activeDrift
            - reachableFrom
        target:
          type: string
        asOf:
          type: string
          format: date-time
        parameters:
          type: object
          additionalProperties: true

    ToolAcceptedResponse:
      type: object
      required: [message, status]
      properties:
        message:
          type: string
        event:
          type: string
        status:
          type: string

    ProposalResponse:
      type: object
      required: [proposal, status, approvalRequired]
      properties:
        proposal:
          type: string
        status:
          $ref: '#/components/schemas/LifecycleStatus'
        approvalRequired:
          type: boolean

    ValidationReport:
      type: object
      required: [validation, valid, issues]
      properties:
        validation:
          type: string
        valid:
          type: boolean
        issues:
          type: array
          items:
            type: object
            additionalProperties: true

    AuthorityResult:
      type: object
      required: [authorityResult, decision, reason]
      properties:
        authorityResult:
          type: string
        decision:
          type: string
          enum: [Permit, Deny, Escalate, RequireEvidence, RequireAuthority, Expired]
        reason:
          type: string

    ReconciliationResponse:
      type: object
      required: [reconciliation, decision, requiredActions, status]
      properties:
        reconciliation:
          type: string
        decision:
          type: string
          enum: [Accepted, Rejected, NeedsEvidence, NeedsAuthority, NeedsContract, NeedsIdentity, NeedsPolicy, Defer, Quarantine, Escalate, Rollback, Supersede]
        requiredActions:
          type: array
          items:
            type: string
        status:
          type: string

    StateResponse:
      type: object
      required: [state, version, status]
      properties:
        state:
          type: string
        version:
          type: integer
          minimum: 1
        status:
          type: string

    ResourceEnvelope:
      type: object
      required: [uri, type, readAt, source, data]
      properties:
        uri:
          type: string
        type:
          type: string
        version:
          type: integer
        readAt:
          type: string
          format: date-time
        source:
          type: string
        data:
          type: object
          additionalProperties: true
        links:
          type: array
          items:
            $ref: '#/components/schemas/FabricLink'

    QueryResponse:
      type: object
      required: [resultType, results]
      properties:
        resultType:
          type: string
        results:
          type: array
          items:
            type: object
            additionalProperties: true

    HealthResponse:
      type: object
      required: [target, health]
      properties:
        target:
          type: string
        health:
          type: string
          enum: [healthy, degraded, failed, unknown]
        drift:
          type: array
          items:
            type: string
        recommendedActions:
          type: array
          items:
            type: string
